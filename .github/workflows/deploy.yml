# Final Stable Deployment - Unified Backend & Frontend
name: BookNest Backend CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: booknest_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install MySQL Client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Create Databases
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS booknest_auth;"
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS booknest_book;"
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS booknest_cart;"
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS booknest_order;"
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS booknest_notification;"
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS booknest_review;"
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS booknest_wallet;"

      - name: Build and Test
        working-directory: Backend
        run: mvn clean test -pl "!eureka-server"
        env:
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
          SPRING_KAFKA_LISTENER_AUTO_STARTUP: "false"
          EUREKA_CLIENT_ENABLED: "false"
          SPRING_BOOT_ADMIN_CLIENT_ENABLED: "false"
          SPRING_CLOUD_CONFIG_ENABLED: "false"

      - name: SonarQube Scan
        working-directory: Backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: mvn sonar:sonar -Dsonar.token=${{ secrets.SONAR_TOKEN }} -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}

  deploy:
    needs: test-and-analyze
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Create project directory if it doesn't exist
            mkdir -p ~/booknest-app
            cd ~/booknest-app

            # Clone or Pull Backend
            if [ ! -d "booknest-backend" ]; then
              git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/Divyansh-Pandey24/BookStoreEcommercePlatformBackend.git booknest-backend
            fi
            cd ~/booknest-app/booknest-backend
            git checkout main
            git pull https://x-access-token:${{ secrets.GH_PAT }}@github.com/Divyansh-Pandey24/BookStoreEcommercePlatformBackend.git main

            # Clone or Pull Frontend
            cd ~/booknest-app
            if [ ! -d "booknest-frontend" ]; then
              git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/Divyansh-Pandey24/BookStoreEcommercePlatform-Frontend.git booknest-frontend
            else
              cd booknest-frontend
              git pull https://x-access-token:${{ secrets.GH_PAT }}@github.com/Divyansh-Pandey24/BookStoreEcommercePlatform-Frontend.git main
            fi

            # Add Swap file if not present (prevents OOM during build on small EC2s)
            cd ~/booknest-app
            if [ ! -f "/swapfile" ]; then
              echo "Creating 2G swap file..."
              sudo fallocate -l 2G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi

            # Ensure Virtual Memory settings for Elasticsearch
            sudo sysctl -w vm.max_map_count=262144

            # Ensure Java, Maven, Docker and Docker Compose are installed
            cd ~/booknest-app
            if ! command -v java &> /dev/null || ! command -v mvn &> /dev/null || ! command -v docker &> /dev/null; then
              echo "Installing dependencies..."
              sudo apt-get update
              sudo apt-get install -y openjdk-17-jdk maven ca-certificates curl gnupg mysql-client
              
              if ! command -v docker &> /dev/null; then
                sudo install -m 0755 -d /etc/apt/keyrings
                curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
                sudo chmod a+r /etc/apt/keyrings/docker.gpg
                echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
                sudo apt-get update
                sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              fi
            fi

            # Build and restart all containers
            cd ~/booknest-app/booknest-backend/Backend
            
            # Create/Update .env file from GitHub Secrets
            echo "CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}" > .env
            echo "CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}" >> .env
            echo "CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}" >> .env
            echo "EMAIL_USERNAME=${{ secrets.EMAIL_USERNAME }}" >> .env
            echo "EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}" >> .env
            echo "SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}" >> .env
            
            mvn clean package -DskipTests
            sudo docker compose down
            sudo docker compose up -d --build
