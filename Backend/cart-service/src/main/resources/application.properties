server.port=8083
spring.application.name=CART-SERVICE

spring.datasource.url=jdbc:mysql://localhost:3306/booknest_cart?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Feign logging â€” shows what Feign sends and receives
# FULL = shows request, response, headers, body
