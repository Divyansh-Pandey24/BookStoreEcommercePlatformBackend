version: "3.8"

services:
  # ============================================================
  # INFRASTRUCTURE
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: booknest-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      # We create all databases on startup
      MYSQL_DATABASE: booknest_auth
    volumes:
      - mysql-data:/var/lib/mysql
      # Initialization script to create multiple databases
      - ./init-mysql.sql:/docker-entrypoint-initdb.d/init-mysql.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis-stack:
    image: redis/redis-stack:latest
    container_name: booknest-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: booknest-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: booknest-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: booknest-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ============================================================
  # MICROSERVICES
  # ============================================================
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_BOOT_ADMIN_CLIENT_URL=http://admin-server:9090
    depends_on:
      eureka-server:
        condition: service_healthy

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_BOOT_ADMIN_CLIENT_URL=http://admin-server:9090
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_auth?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_REDIS_HOST=redis-stack
      - MANAGEMENT_HEALTH_MAIL_ENABLED=false
      - EMAIL_USERNAME=${EMAIL_USERNAME}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}

      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
      redis-stack:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  book-service:
    build: ./book-service-1
    container_name: book-service
    ports:
      - "8082:8082"
    volumes:
      - ./book-service-1/uploads:/app/uploads
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_BOOT_ADMIN_CLIENT_URL=http://admin-server:9090
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_book?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_REDIS_HOST=redis-stack
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      - APP_UPLOAD_DIR=/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis-stack:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  cart-service:
    build: ./cart-service
    container_name: cart-service
    ports:
      - "8083:8083"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_BOOT_ADMIN_CLIENT_URL=http://admin-server:9090
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_cart?useSSL=false&allowPublicKeyRetrieval=true
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8084:8084"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_BOOT_ADMIN_CLIENT_URL=http://admin-server:9090
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_order?useSSL=false&allowPublicKeyRetrieval=true
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started

  wallet-service:
    build: ./wallet-service
    container_name: wallet-service
    ports:
      - "8085:8085"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_BOOT_ADMIN_CLIENT_URL=http://admin-server:9090
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_wallet?useSSL=false&allowPublicKeyRetrieval=true
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8086:8086"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_BOOT_ADMIN_CLIENT_URL=http://admin-server:9090
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EMAIL_USERNAME=${EMAIL_USERNAME}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_notification?useSSL=false&allowPublicKeyRetrieval=true

    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started

  review-service:
    build: ./review-service
    container_name: review-service
    ports:
      - "8087:8087"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_BOOT_ADMIN_CLIENT_URL=http://admin-server:9090
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_review?useSSL=false&allowPublicKeyRetrieval=true
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  admin-server:
    build: ./admin-server
    container_name: admin-server
    ports:
      - "9090:9090"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy

volumes:
  mysql-data:
  redis-data:
  es-data:
