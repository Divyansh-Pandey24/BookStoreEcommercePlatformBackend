# ============================================================
# SERVER
# ============================================================

# Port 9090 is the widely-used convention for Spring Boot Admin.
# We avoid 8080 (gateway), 8761 (eureka) to prevent conflicts.
# All other services stay on their own ports.
server.port=9090

# Name that appears in Eureka dashboard.
# Uppercase is the convention for microservice names.
spring.application.name=ADMIN-SERVER

# ============================================================
# SPRING BOOT ADMIN UI — SECURITY
# Admin dashboard is protected by username + password.
# Without this, anyone on the network can:
#   - See all your environment variables (DB passwords!)
#   - Change log levels
#   - Download heap dumps
# IMPORTANT: Change these credentials in production.
# ============================================================

# Username to log into the Admin UI at http://localhost:9090
spring.security.user.name=${SPRING_BOOT_ADMIN_USERNAME:admin}
spring.security.user.password=${SPRING_BOOT_ADMIN_PASSWORD:admin123}

# ============================================================
# EUREKA — Service Discovery
# Admin Server registers with Eureka on startup.
# It then QUERIES Eureka to auto-discover all other services.
# This means: services do NOT need to know the admin URL —
# admin server finds them automatically via Eureka.
# ============================================================

# Eureka server location.
# Admin server registers itself here so Eureka dashboard
# also shows "ADMIN-SERVER" as a registered service.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Send heartbeat every 10 seconds.
# Default is 30 — we use 10 for faster dev feedback.
eureka.instance.lease-renewal-interval-in-seconds=10

# ============================================================
# ADMIN SERVER — SERVICE DISCOVERY MODE
# When this is set to "EUREKA", the Admin Server automatically
# discovers ALL services registered in Eureka.
# No need to point each service manually to admin-server URL.
# This is the recommended configuration for Spring Cloud projects.
# ============================================================
spring.boot.admin.discovery.enabled=true

# ============================================================
# ACTUATOR (on the admin server itself)
# Exposes internal health/info endpoints of this admin server.
# The wildcard (*) exposes ALL actuator endpoints including:
#   /actuator/health, /actuator/info, /actuator/env,
#   /actuator/metrics, /actuator/loggers, /actuator/threaddump
# Note: in production you should limit this to only what is needed.
# ============================================================
management.endpoints.web.exposure.include=*

# Show full health details (UP/DOWN + component breakdown).
# In production: change to "when-authorized"
management.endpoint.health.show-details=always

# ============================================================
# LOGGING
# ============================================================
# Reduce noisy Eureka heartbeat logs.
# Change to DEBUG if you need to debug Eureka registration.
logging.level.com.netflix.eureka=WARN
logging.level.com.netflix.discovery=WARN
