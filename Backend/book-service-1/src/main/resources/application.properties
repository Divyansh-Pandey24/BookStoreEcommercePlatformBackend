# ============================================================
# SERVER CONFIGURATION
# ============================================================
server.port=8082
spring.application.name=BOOK-SERVICE

# ============================================================
# MYSQL DATABASE CONFIGURATION
# ============================================================
# First create database: CREATE DATABASE booknest_book;
spring.datasource.url=jdbc:mysql://localhost:3306/booknest_book?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

# Hibernate will create/update tables automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ============================================================
# ELASTICSEARCH CONFIGURATION
# ============================================================
# Elasticsearch runs on port 9200 by default
spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
spring.elasticsearch.connection-timeout=5s
spring.elasticsearch.socket-timeout=30s

# ============================================================
# EUREKA SERVICE DISCOVERY
# ============================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.lease-renewal-interval-in-seconds=10

# ============================================================
# CLOUDINARY — Cloud Image Storage (replaces local uploads/)
# ============================================================
# Sign up free at https://cloudinary.com → Dashboard → copy these values
# IMPORTANT: Replace the placeholder values below with your real credentials
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dummy}
cloudinary.api-key=${CLOUDINARY_API_KEY:dummy}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:dummy}

# Max upload size (5MB limit still enforced in ImageStorageService)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Legacy upload directory (for DataFixer maintenance)
app.upload.dir=${APP_UPLOAD_DIR:uploads/books}

# ============================================================
# REDIS — Book Cache
# ============================================================
# Redis Stack runs via Docker (docker-compose.yml in /Backend)
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}

# ============================================================
# ACTUATOR (for health checks)
# ============================================================
# ============================================================
# SPRING BOOT ADMIN CLIENT
# ============================================================

# URL of the Admin Server dashboard.
# This service will POST its health/info data to this address on startup.
spring.boot.admin.client.url=http://localhost:9090

# Credentials to authenticate with the Admin Server.
# MUST match spring.security.user.name/password in admin-server.
spring.boot.admin.client.username=admin
spring.boot.admin.client.password=admin123

# The name this service shows up as in the Admin UI.
spring.boot.admin.client.instance.name=BOOK-SERVICE

# ============================================================
# ACTUATOR — expose endpoints for Admin Server to read
# ============================================================

# Expose ALL actuator endpoints over HTTP.
# Admin Server reads: health, info, env, metrics, loggers,
# threaddump, heapdump, configprops, mappings.
management.endpoints.web.exposure.include=*

# Show full breakdown: which DB, disk, Eureka are UP/DOWN.
management.endpoint.health.show-details=always

# ============================================================
# GATEWAY SECRET
# ============================================================
gateway.secret=${GATEWAY_SECRET:booknest-gateway-secret-key-12345}


