# ============================================================
# SERVER CONFIGURATION
# ============================================================
server.port=8082
spring.application.name=BOOK-SERVICE

# ============================================================
# MYSQL DATABASE CONFIGURATION
# ============================================================
# First create database: CREATE DATABASE booknest_book;
spring.datasource.url=jdbc:mysql://localhost:3306/booknest_book?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234

# Hibernate will create/update tables automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ============================================================
# ELASTICSEARCH CONFIGURATION
# ============================================================
# Elasticsearch runs on port 9200 by default
spring.elasticsearch.uris=http://localhost:9200
spring.elasticsearch.connection-timeout=5s
spring.elasticsearch.socket-timeout=30s

# ============================================================
# EUREKA SERVICE DISCOVERY
# ============================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.lease-renewal-interval-in-seconds=10

# ============================================================
# FILE UPLOAD CONFIGURATION
# ============================================================
# Where to save book cover images on disk
app.upload.dir=uploads/books/
# Maximum file size for image uploads (5MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ============================================================
# ACTUATOR (for health checks)
# ============================================================
management.endpoints.web.exposure.include=health,info

