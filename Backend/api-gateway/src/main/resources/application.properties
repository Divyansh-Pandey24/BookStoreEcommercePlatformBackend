# ============================================================
# SERVER
# ============================================================

# Gateway is the ONLY public port.
# React sends EVERY request here.
# No other service port is exposed to the outside world.
server.port=8080

# Name that appears in Eureka dashboard.
# Uppercase is convention for microservice names.
spring.application.name=API-GATEWAY

# ============================================================
# EUREKA — connect to registry
# ============================================================

# Where Eureka server is running.
# Gateway registers itself here on startup.
# Also queries this to find other services.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# How often gateway sends heartbeat to Eureka (seconds).
# Default: 30. We use 10 for faster dev feedback.
eureka.instance.lease-renewal-interval-in-seconds=10

# ============================================================
# ROUTING — the most important gateway config
# Tell gateway: "when request path matches, 
# forward to this service"
# ============================================================

# ROUTE 1 — Auth Service
# Any request to /api/auth/** goes to AUTH-SERVICE
#
# id: unique name for this route (for logging)
# uri: lb://AUTH-SERVICE
#   lb = load balancer = ask Eureka for the address
#   AUTH-SERVICE = must match spring.application.name 
#                  in auth-service exactly
# predicates: the matching condition
#   Path=/api/auth/** means: match any URL starting 
#   with /api/auth/
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1    


# ROUTE 2 — Book Service
spring.cloud.gateway.routes[1].id=book-service
spring.cloud.gateway.routes[1].uri=lb://BOOK-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/books/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1   


# ROUTE 3 — Cart Service
spring.cloud.gateway.routes[2].id=cart-service
spring.cloud.gateway.routes[2].uri=lb://CART-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/cart/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1    


# ROUTE 4 — Order Service
spring.cloud.gateway.routes[3].id=order-service
spring.cloud.gateway.routes[3].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/orders/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1   


# ROUTE 5 — Wallet Service
spring.cloud.gateway.routes[4].id=wallet-service
spring.cloud.gateway.routes[4].uri=lb://WALLET-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/wallet/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1   


# ROUTE 6 — Review Service
spring.cloud.gateway.routes[5].id=review-service
spring.cloud.gateway.routes[5].uri=lb://REVIEW-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/reviews/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=1    


# ROUTE 7 — Notification Service
spring.cloud.gateway.routes[6].id=notification-service
spring.cloud.gateway.routes[6].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=1    

# ====================== GOOGLE OAUTH2 ROUTE (Important) ======================
spring.cloud.gateway.routes[7].id=oauth2-callback
spring.cloud.gateway.routes[7].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/login/oauth2/**,/oauth2/**
spring.cloud.gateway.routes[7].filters[0]=StripPrefix=0

## ROUTE 8 — AI Service
#spring.cloud.gateway.routes[7].id=ai-service
#spring.cloud.gateway.routes[7].uri=lb://AI-SERVICE
#spring.cloud.gateway.routes[7].predicates[0]=Path=/api/ai/**
#spring.cloud.gateway.routes[7].filters[0]=StripPrefix=1   

# ROUTE 9 — Book Service Static Images (uploads)
# ✅ FIX: Without this route, the gateway had no way to forward
# /uploads/** requests to the book-service, so images returned 404.
# StripPrefix=0 keeps the /uploads/ prefix intact so Spring Boot
# inside book-service can match it with its ResourceHandler.
spring.cloud.gateway.routes[8].id=book-service-uploads
spring.cloud.gateway.routes[8].uri=lb://BOOK-SERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/uploads/**
spring.cloud.gateway.routes[8].filters[0]=StripPrefix=0


# ============================================================
# JWT SECRET
# MUST be IDENTICAL to the value in every other service.
# Gateway uses this to VERIFY tokens.
# Auth-service uses this to SIGN tokens.
# Same key = they can verify each other's tokens.
# ============================================================
jwt.secret=booknest-super-secret-key-must-be-32-chars-min

# ============================================================
# CORS — Allow React to reach the gateway
# ============================================================
# ✅ FIXED — allow both ports
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000,http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

# ============================================================
# ACTUATOR
# ============================================================
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always

# ============================================================
# LOGGING
# ============================================================
# Shows which route each request matched — great for debugging
logging.level.org.springframework.cloud.gateway=DEBUG
# Change to WARN in production

# ============================================================
# SWAGGER / OPENAPI DOC ROUTES (DEDICATED)
# ============================================================
# We create special routes for Swagger to fetch the JSON docs
# because the regular /api/X routes strip the '/api' prefix, 
# which corrupts the internal '/v3/api-docs' path.

spring.cloud.gateway.routes[9].id=auth-docs
spring.cloud.gateway.routes[9].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[9].predicates[0]=Path=/auth-docs/**
spring.cloud.gateway.routes[9].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[10].id=book-docs
spring.cloud.gateway.routes[10].uri=lb://BOOK-SERVICE
spring.cloud.gateway.routes[10].predicates[0]=Path=/book-docs/**
spring.cloud.gateway.routes[10].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[11].id=cart-docs
spring.cloud.gateway.routes[11].uri=lb://CART-SERVICE
spring.cloud.gateway.routes[11].predicates[0]=Path=/cart-docs/**
spring.cloud.gateway.routes[11].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[12].id=order-docs
spring.cloud.gateway.routes[12].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[12].predicates[0]=Path=/order-docs/**
spring.cloud.gateway.routes[12].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[13].id=wallet-docs
spring.cloud.gateway.routes[13].uri=lb://WALLET-SERVICE
spring.cloud.gateway.routes[13].predicates[0]=Path=/wallet-docs/**
spring.cloud.gateway.routes[13].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[14].id=review-docs
spring.cloud.gateway.routes[14].uri=lb://REVIEW-SERVICE
spring.cloud.gateway.routes[14].predicates[0]=Path=/review-docs/**
spring.cloud.gateway.routes[14].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[15].id=notification-docs
spring.cloud.gateway.routes[15].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[15].predicates[0]=Path=/notification-docs/**
spring.cloud.gateway.routes[15].filters[0]=StripPrefix=1

# ============================================================
# SWAGGER / OPENAPI (AGGREGATION)
# ============================================================
# Enable Swagger UI inside the Gateway itself
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# List all the microservices using the dedicated doc routes defined above
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/auth-docs/v3/api-docs
springdoc.swagger-ui.urls[1].name=Book Service
springdoc.swagger-ui.urls[1].url=/book-docs/v3/api-docs
springdoc.swagger-ui.urls[2].name=Cart Service
springdoc.swagger-ui.urls[2].url=/cart-docs/v3/api-docs
springdoc.swagger-ui.urls[3].name=Order Service
springdoc.swagger-ui.urls[3].url=/order-docs/v3/api-docs
springdoc.swagger-ui.urls[4].name=Wallet Service
springdoc.swagger-ui.urls[4].url=/wallet-docs/v3/api-docs
springdoc.swagger-ui.urls[5].name=Review Service
springdoc.swagger-ui.urls[5].url=/review-docs/v3/api-docs
springdoc.swagger-ui.urls[6].name=Notification Service
springdoc.swagger-ui.urls[6].url=/notification-docs/v3/api-docs