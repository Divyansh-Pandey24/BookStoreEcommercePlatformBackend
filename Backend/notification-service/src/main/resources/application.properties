# Kafka Consumer Configuration
# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-group


spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# Delegate actual deserialization to JsonDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# Trust all packages so JsonDeserializer can instantiate our DTOs
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# â”€â”€ THE FIX â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
#
# ROOT CAUSE OF MISSING ORDER EMAILS (V1 bug):
#
#   V1 had: spring.json.value.default.type=WalletEventDto
#   This forced EVERY Kafka message â€” from every topic â€” to deserialize
#   as WalletEventDto. When order-service published an OrderEventDto:
#     1. JsonDeserializer mapped it to WalletEventDto (wrong type)
#     2. Spring tried to call handleOrderEvent(OrderEventDto) with a
#        WalletEventDto argument â†’ type mismatch â†’ message silently dropped
#     3. No notification saved, no email sent
#
#   V1 also had a wrong type.mapping using topic names as keys:
#     spring.json.type.mapping=order-events:OrderEventDto,...
#   This does NOT work â€” spring.json.type.mapping maps __TypeId__ HEADER
#   VALUES to classes, not topic names. So it did nothing.
#
# THE FIX (no KafkaConfig.java needed, KafkaConsumer.java stays as-is):
#
#   Each producer (order-service, wallet-service) uses Spring's JsonSerializer
#   which automatically adds a __TypeId__ header to every Kafka message:
#     order-service  â†’ __TypeId__: com.booknest.order.dto.OrderEventDto
#     wallet-service â†’ __TypeId__: com.booknest.wallet.dto.WalletEventDto
#
#   But those classes don't exist in notification-service (different package).
#   Without mapping â†’ ClassNotFoundException.
#
#   spring.json.type.mapping maps a producer class name â†’ local class name,
#   so JsonDeserializer knows which local class to instantiate.
#
#   With this mapping + use.type.headers=true:
#     â€¢ order-events messages â†’ correctly deserialized as OrderEventDto âœ…
#     â€¢ wallet-events messages â†’ correctly deserialized as WalletEventDto âœ…
#     â€¢ Both @KafkaListener methods get the right type â†’ saveNotification() fires â†’ email sent âœ…
#
# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

# Enable type headers â€” let each message identify itself via __TypeId__ header
spring.kafka.consumer.properties.spring.json.use.type.headers=true

# Map producer's fully-qualified class â†’ notification-service's local class
# Format: producerClass:localClass (comma-separated, no spaces around colon)
spring.kafka.consumer.properties.spring.json.type.mapping=com.booknest.order.dto.OrderEventDto:com.booknest.notification.dto.OrderEventDto,com.booknest.wallet.dto.WalletEventDto:com.booknest.notification.dto.WalletEventDto

# Start from the beginning if this consumer group has no stored offset
spring.kafka.consumer.auto-offset-reset=earliest

