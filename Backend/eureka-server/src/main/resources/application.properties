# ============================================================
# SERVER
# ============================================================

# Eureka ALWAYS runs on 8761 — worldwide convention.
# Every developer, every tutorial, every company expects 
# Eureka on 8761. Don't change this.
server.port=8761

# Name of this application.
# Shows up in logs and monitoring tools.
spring.application.name=eureka-server

# ============================================================
# EUREKA SERVER BEHAVIOUR
# ============================================================

# Should this Eureka server register ITSELF as a client?
# false = NO. It IS the registry — it shouldn't register 
#         with itself. That would cause an infinite loop.
# true  = YES (only for clustered Eureka with multiple 
#         Eureka instances — not needed for us)
eureka.client.register-with-eureka=false

# Should this Eureka server download the service list 
# from another Eureka?
# false = NO. It IS the source of truth.
#         There's no other Eureka to fetch from.
# true  = YES (only for clustered setup)
eureka.client.fetch-registry=false

# How long before Eureka removes a service that stopped 
# sending heartbeats? (in milliseconds)
# Default is 90 seconds — too long during development.
# 5000ms = 5 seconds — dead services disappear quickly.
# In production use 60000 (60 seconds).
eureka.server.eviction-interval-timer-in-ms=5000

# How long Eureka waits for a lease to expire (seconds)
# Default: 90 seconds
# We lower to 30 for faster development feedback
eureka.instance.lease-expiration-duration-in-seconds=30

# ============================================================
# DASHBOARD
# ============================================================

# Enable the Eureka web dashboard
# Access at: http://localhost:8761
# Shows all registered services and their status
eureka.dashboard.enabled=true

# ============================================================
# ACTUATOR (health checks)
# ============================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ============================================================
# LOGGING — helpful during development
# ============================================================
logging.level.com.netflix.eureka=WARN
logging.level.com.netflix.discovery=WARN
# WARN hides the noisy Eureka heartbeat logs.
# Change to DEBUG if you need to troubleshoot registration.