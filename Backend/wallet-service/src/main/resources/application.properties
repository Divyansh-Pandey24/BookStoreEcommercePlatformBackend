server.port=8085
spring.application.name=WALLET-SERVICE

# Changed: added useSSL, serverTimezone, allowPublicKeyRetrieval
spring.datasource.url=jdbc:mysql://localhost:3306/wallet_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


eureka.instance.prefer-ip-address=true
# eureka.instance.hostname=localhost


# Feign Client Configuration
feign.client.config.default.loggerLevel=FULL
feign.circuitbreaker.enabled=false
razorpay.key.id=${RAZORPAY_KEY_ID:dummy}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:dummy}

gateway.secret=${GATEWAY_SECRET:booknest-gateway-secret-key-12345}

# ============================================================
# SPRING BOOT ADMIN CLIENT
# ============================================================

# URL of the Admin Server dashboard.
# This service will POST its health/info data to this address on startup.
spring.boot.admin.client.url=http://localhost:9090

# Credentials to authenticate with the Admin Server.
# MUST match spring.security.user.name/password in admin-server.
spring.boot.admin.client.username=admin
spring.boot.admin.client.password=admin123

# The name this service shows up as in the Admin UI.
spring.boot.admin.client.instance.name=WALLET-SERVICE

# ============================================================
# ACTUATOR â€” expose endpoints for Admin Server to read
# ============================================================

# Expose ALL actuator endpoints over HTTP.
# Admin Server reads: health, info, env, metrics, loggers,
# threaddump, heapdump, configprops, mappings.
management.endpoints.web.exposure.include=*

# Show full breakdown: which DB, disk, Eureka are UP/DOWN.
management.endpoint.health.show-details=always


# ============================================================
# CIRCUIT BREAKER & FAULT TOLERANCE — Resilience4j
# ============================================================

# STEP 1: Enable Feign circuit breaker integration.
# Without this, the fallback= attribute on @FeignClient is IGNORED.
feign.circuitbreaker.enabled=true

# ============================================================
# CIRCUIT BREAKER config (applies to all FeignClients by default)
# ============================================================

# How many recent calls to track (sliding window).
# Circuit opens when failure rate in this window exceeds the threshold.
resilience4j.circuitbreaker.configs.default.sliding-window-size=10

# Open circuit when 50% of the last 10 calls fail.
# Example: 5 failures out of 10 calls ? OPEN.
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50

# Minimum calls before circuit can open.
# Prevents circuit from opening on just 1-2 initial failures.
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5

# How long to stay OPEN before trying a real call again (HALF-OPEN).
# After 10 seconds, Resilience4j lets through a test call.
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s

# Number of test calls in HALF-OPEN state before deciding to CLOSE or REOPEN.
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3

# Automatically move from OPEN to HALF-OPEN after waitDuration.
# Without this, it stays OPEN forever until a call manually triggers it.
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true

# ============================================================
# RETRY config — retry before calling fallback
# ============================================================

# How many total attempts (1 original + 2 retries = 3 total).
# If all 3 fail ? fallback is called.
resilience4j.retry.configs.default.max-attempts=3

# Wait 500ms between each retry.
# Gives the downstream service a moment to recover.
resilience4j.retry.configs.default.wait-duration=500ms

# ============================================================
# TIMEOUT — cancel slow calls before they hang the thread
# ============================================================

# If a downstream call takes more than 5 seconds ? cancel it.
# This prevents slow services from tying up all available threads.
# Feign's default is no timeout — so this is essential.
resilience4j.timelimiter.configs.default.timeout-duration=5s

# Cancel the underlying HTTP call when timeout fires.
resilience4j.timelimiter.configs.default.cancel-running-future=true
