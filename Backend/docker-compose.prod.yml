# Final Production Deploy - Port 80 Unified (Clean URL Fix)
version: "3.8"

services:
  # ============================================================
  # INFRASTRUCTURE (Unchanged, using standard images)
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: booknest-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      MYSQL_DATABASE: booknest_auth
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-mysql.sql:/docker-entrypoint-initdb.d/init-mysql.sql
    networks:
      - booknest-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-1234}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-stack:
    image: redis/redis-stack:latest
    container_name: booknest-redis
    volumes:
      - redis-data:/data
    networks:
      - booknest-network
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: booknest-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - booknest-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: booknest-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - booknest-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: booknest-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx384m
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - booknest-network
    restart: unless-stopped

  # ============================================================
  # MICROSERVICES (Internal - No public ports)
  # ============================================================
  eureka-server:
    build: ./eureka-server
    image: booknest-eureka-server:latest
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8761 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - booknest-network
    restart: always

  api-gateway:
    build: ./api-gateway
    image: booknest-api-gateway:latest
    container_name: api-gateway
    ports:
      - "8080:8080"
      - "81:8080"
      - "8000:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      - eureka-server
    networks:
      - booknest-network
    restart: always

  auth-service:
    build: ./auth-service
    image: booknest-auth-service:latest
    container_name: auth-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_auth
      - SPRING_REDIS_HOST=redis-stack
      - EMAIL_USERNAME=${EMAIL_USERNAME:-dummy}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-dummy}
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      - mysql
      - eureka-server
    networks:
      - booknest-network
    restart: always

  book-service:
    build: ./book-service-1
    image: booknest-book-service:latest
    container_name: book-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_book
      - SPRING_REDIS_HOST=redis-stack
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - APP_UPLOAD_DIR=/app/uploads/books
      - JAVA_OPTS=-Xms128m -Xmx256m
    volumes:
      - book-images:/app/uploads
    depends_on:
      - mysql
      - eureka-server
    networks:
      - booknest-network
    restart: always

  order-service:
    build: ./order-service
    image: booknest-order-service:latest
    container_name: order-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_order
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      - mysql
      - kafka
    networks:
      - booknest-network
    restart: always

  cart-service:
    build: ./cart-service
    image: booknest-cart-service:latest
    container_name: cart-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_cart
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      - mysql
      - eureka-server
    networks:
      - booknest-network
    restart: always

  wallet-service:
    build: ./wallet-service
    image: booknest-wallet-service:latest
    container_name: wallet-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_wallet
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      - mysql
      - kafka
    networks:
      - booknest-network
    restart: always

  notification-service:
    build: ./notification-service
    image: booknest-notification-service:latest
    container_name: notification-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EMAIL_USERNAME=${EMAIL_USERNAME:-dummy}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-dummy}
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_notification
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      - mysql
      - kafka
    networks:
      - booknest-network
    restart: always

  review-service:
    build: ./review-service
    image: booknest-review-service:latest
    container_name: review-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_review
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      - mysql
      - eureka-server
    networks:
      - booknest-network
    restart: always

  admin-server:
    build: ./admin-server
    image: booknest-admin-server:latest
    container_name: admin-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
    networks:
      - booknest-network
    restart: always

  frontend:
    build: ../../booknest-frontend
    image: booknest-frontend:latest
    container_name: booknest-frontend
    network_mode: host
    depends_on:
      - api-gateway
    restart: always

networks:
  booknest-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  es-data:
  book-images:
