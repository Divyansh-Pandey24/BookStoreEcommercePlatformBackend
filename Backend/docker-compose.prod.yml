version: "3.8"

services:
  # ============================================================
  # INFRASTRUCTURE (Unchanged, using standard images)
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: booknest-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      MYSQL_DATABASE: booknest_auth
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-mysql.sql:/docker-entrypoint-initdb.d/init-mysql.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-1234}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-stack:
    image: redis/redis-stack:latest
    container_name: booknest-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: booknest-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: booknest-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: booknest-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ============================================================
  # MICROSERVICES (Using ECR Images)
  # ============================================================
  eureka-server:
    image: ${ECR_REGISTRY}/booknest-eureka-server:latest
    container_name: eureka-server
    ports:
      - "8761:8761"
    restart: always

  api-gateway:
    image: ${ECR_REGISTRY}/booknest-api-gateway:latest
    container_name: api-gateway
    ports:
      - "9000:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
    restart: always

  auth-service:
    image: ${ECR_REGISTRY}/booknest-auth-service:latest
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_auth
      - SPRING_REDIS_HOST=redis-stack
      - EMAIL_USERNAME=${EMAIL_USERNAME:-dummy}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-dummy}
    depends_on:
      - mysql
      - eureka-server
    restart: always

  book-service:
    image: ${ECR_REGISTRY}/booknest-book-service:latest
    container_name: book-service
    ports:
      - "8082:8082"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_book
      - SPRING_REDIS_HOST=redis-stack
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    depends_on:
      - mysql
      - eureka-server
    restart: always

  order-service:
    image: ${ECR_REGISTRY}/booknest-order-service:latest
    container_name: order-service
    ports:
      - "8084:8084"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_order
    depends_on:
      - mysql
      - kafka
    restart: always
  cart-service:
    image: ${ECR_REGISTRY}/booknest-cart-service:latest
    container_name: cart-service
    ports:
      - "8083:8083"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_cart
    depends_on:
      - mysql
      - eureka-server
    restart: always

  wallet-service:
    image: ${ECR_REGISTRY}/booknest-wallet-service:latest
    container_name: wallet-service
    ports:
      - "8085:8085"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_wallet
    depends_on:
      - mysql
      - kafka
    restart: always

  notification-service:
    image: ${ECR_REGISTRY}/booknest-notification-service:latest
    container_name: notification-service
    ports:
      - "8086:8086"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EMAIL_USERNAME=${EMAIL_USERNAME:-dummy}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-dummy}
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_notification
    depends_on:
      - mysql
      - kafka
    restart: always

  review-service:
    image: ${ECR_REGISTRY}/booknest-review-service:latest
    container_name: review-service
    ports:
      - "8087:8087"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/booknest_review
    depends_on:
      - mysql
      - eureka-server
    restart: always

  admin-server:
    image: ${ECR_REGISTRY}/booknest-admin-server:latest
    container_name: admin-server
    ports:
      - "9090:9090"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
    restart: always

  frontend:
    image: ${ECR_REGISTRY}/booknest-frontend:latest
    container_name: booknest-frontend
    ports:
      - "80:80"
    restart: always

volumes:
  mysql-data:
  redis-data:
  es-data:
