server.port=8084
spring.application.name=ORDER-SERVICE

spring.datasource.url=jdbc:mysql://localhost:3306/booknest_order?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Kafka broker address
spring.kafka.bootstrap-servers=localhost:9092

# Producer settings
# How to convert Java object to JSON string for Kafka
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


feign.client.config.default.loggerLevel=FULL
logging.level.com.booknest.order.client=DEBUG

