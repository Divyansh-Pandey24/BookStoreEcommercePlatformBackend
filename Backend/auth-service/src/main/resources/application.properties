# ============================================================
# SERVER CONFIGURATION
# ============================================================

# Port this service runs on.
# React â†’ 3000 | API Gateway â†’ 8080 | Auth-Service â†’ 8081
server.port=8081

# Name Eureka uses to register this service.
# The API Gateway routes to this exact name: lb://AUTH-SERVICE
# Uppercase is the convention for microservice names.
spring.application.name=AUTH-SERVICE

# ============================================================
# MYSQL DATABASE
# ============================================================

# Run this in MySQL Workbench FIRST before starting the app:
#   CREATE DATABASE booknest_auth;
spring.datasource.url=jdbc:mysql://localhost:3306/booknest_auth?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Your local MySQL credentials
spring.datasource.username=root
spring.datasource.password=1234

# Hibernate SQL dialect for MySQL 8.
# Without this Hibernate guesses â€” sometimes incorrectly.
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# update â†’ add new columns/tables on startup but NEVER delete existing data.
# Never use "create" or "create-drop" in production â€” they wipe the database.
spring.jpa.hibernate.ddl-auto=update

# Show generated SQL in the console â€” very helpful for debugging.
# Set to false in production to reduce log noise.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# EUREKA â€” Service Registration & Discovery
# ============================================================

# Where the Eureka server is running.
# Auth-service registers itself here on startup and sends
# a heartbeat every 10 seconds to confirm it is alive.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.lease-renewal-interval-in-seconds=10

# ============================================================
# JWT TOKENS
# ============================================================

# Secret key used to SIGN tokens in auth-service
# and to VERIFY tokens in api-gateway.
# MUST be identical in both services â€” if they differ,
# every token verification in the gateway fails.
# Must be at least 32 characters for HMAC-SHA256.
# In production: load from an environment variable, never hardcode.
jwt.secret=booknest-super-secret-key-must-be-32-chars-min

# Access token lifetime: 15 minutes (900,000 ms).
# Short-lived â€” limits the damage window if a token is stolen.
jwt.access-token-expiry=900000

# Refresh token lifetime: 7 days (604,800,000 ms).
# Long-lived â€” used only to silently obtain a new access token.
jwt.refresh-token-expiry=604800000

# ============================================================
# GOOGLE OAUTH2
# ============================================================

# Obtain these from: console.cloud.google.com
#   â†’ APIs & Services â†’ Credentials â†’ OAuth 2.0 Client IDs
# Add http://localhost:8081/login/oauth2/code/google as an
# authorised redirect URI in the Google Cloud Console.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# What data we request from Google about the authenticated user:
#   openid  â†’ enables OIDC (gives us an OidcUser principal with typed getters)
#   email   â†’ user's Gmail address
#   profile â†’ display name and profile picture URL
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# Spring auto-generates the OAuth2 callback URL as:
#   /login/oauth2/code/{registrationId}
# For Google: /login/oauth2/code/google
# This MUST exactly match the redirect URI registered in Google Cloud Console.

# ============================================================
# CORS â€” Allow React to talk to this service directly
# ============================================================
# âœ… FIXED
#spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173
# Allow circular bean references (temporary workaround if needed).
# Try to eliminate circular dependencies as the codebase grows.
spring.main.allow-circular-references=true

# ============================================================
# EMAIL (Gmail SMTP) â€” for password-reset emails
# ============================================================

# Gmail SMTP server settings
spring.mail.host=smtp.gmail.com
spring.mail.port=587

# Your Gmail address and App Password.
# NEVER use your real Google account password here.
# Generate an App Password: myaccount.google.com â†’ Security â†’ App Passwords
# In production: load from environment variables.
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
#caqmwiwetzuujnew
# Required for Gmail SMTP â€” authentication and STARTTLS encryption
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Add this line â€” must EXACTLY match what's in Google Cloud Console
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

